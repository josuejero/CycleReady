name: GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Debug dist output
        run: |
          echo "dist size and entries:"
          du -sh dist
          ls -al dist
          echo ".vite manifest (if present):"
          if [ -f dist/.vite/manifest.json ]; then
            cat dist/.vite/manifest.json
          else
            echo "manifest missing"
          fi
      - name: Deploy release room
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "chore: deploy release room"
